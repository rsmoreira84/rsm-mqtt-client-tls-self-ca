# MQTTS (8883) only: no plain AMQP, no plain MQTT (1883) on this node
# Cert paths are inside the container — see docker-compose volume mounts
# See https://www.rabbitmq.com/docs/3.13/mqtt#tls-support

loopback_users = none

# No AMQP
listeners.tcp = none

# TLS: same cert/key are used for the MQTT SSL listener (per RabbitMQ doc)
ssl_options.certfile  = /etc/rabbitmq/tls/broker-chain.pem
ssl_options.keyfile   = /etc/rabbitmq/tls/rabbitmq-server.key
ssl_options.verify    = verify_none
ssl_options.fail_if_no_peer_cert = false

# TLS MQTT (8883); disable plain-text MQTT
mqtt.listeners.tcp  = none
mqtt.listeners.ssl.default = 8883
mqtt.vhost  = /
mqtt.exchange = amq.topic
