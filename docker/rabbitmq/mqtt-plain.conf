# Plain MQTT (1883) only: no AMQP 5672, no management (use rabbitmq:3.13 image)
# See https://www.rabbitmq.com/docs/3.13/mqtt

# Allow default guest from Docker network (not only 127.0.0.1)
loopback_users = none

# Disable core AMQP 0-9-1 / AMQP 1.0 TCP listeners; MQTT has its own listener
listeners.tcp = none

# MQTT (clear text) on 1883
mqtt.listeners.tcp.default = 1883
mqtt.vhost  = /
mqtt.exchange = amq.topic

# Do not start TLS for MQTT on this node
# (omit mqtt.listeners.ssl — no ssl_options in this file)
